name = "drift-mail"
main = "src/index.js"
compatibility_date = "2024-01-01"

[assets]
directory = "public"
binding = "ASSETS"

[triggers]
crons = ["*/5 * * * *"]

# 绑定 D1 数据库和 KV 命名空间
# 取消注释并替换为你的实际 ID，或在 Dashboard 手动绑定
# [[d1_databases]]
# binding = "DB"
# database_name = "drift-mail-db"
# database_id = "your-d1-database-id"
# 
# [[kv_namespaces]]
# binding = "MAIL_KV"
# id = "your-kv-namespace-id"
